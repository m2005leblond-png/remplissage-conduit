<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remplissage de conduit</title>

  <link rel="icon" type="image/png" href="icon-192.png">

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#1e88e5">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>

<body>

  <h1>
    Calcul de remplissage de conduit 
    <span id="versionApp" style="font-size: 0.5em; opacity: 0.6; font-weight: normal; margin-left: 10px;"></span>
  </h1>

  <label for="typeConduit">Type de conduit</label>
  <select id="typeConduit">
    <option value="CONDUIT EMT">CONDUIT EMT</option>
    <option value="CONDUIT RIGID">CONDUIT RIGID</option>
    <option value="CONDUIT MÉTALLIQUE FLEX">CONDUIT MÉTALLIQUE FLEX</option>
    <option value="CONDUIT MÉTALLIQUE FLEX ÉTANCHE">CONDUIT MÉTALLIQUE FLEX ÉTANCHE</option>
    <option value="CONDUIT PVC RIGIDE">CONDUIT PVC RIGIDE</option>
    <option value="CONDUIT PVC EB1/BD2">CONDUIT PVC EB1/BD2</option>
    <option value="CONDUIT NON-MÉTAL FLEX ÉTANCHE">CONDUIT NON-MÉTAL FLEX ÉTANCHE</option>
  </select>

  <label for="nbFils">% de remplissage voulu</label>
  <select id="nbFils">
    <option value="1">53 % (1 fil)</option>
    <option value="2">31 % (2 fils)</option>
    <option value="3" selected>40 % (3 fils et plus)</option>
    <option value="4">38 %</option>
    <option value="5">35 %</option>
    <option value="6">60 %</option>
    <option value="7">50 %</option>
  </select>

  <label for="categorieCable">Type de câble</label>
  <select id="categorieCable">
    <option value="RW">RW</option>
    <option value="RWU">RWU</option>
    <option value="FAS">FAS</option>
    <option value="FAS VITALINK">FAS VITALINK</option>
    <option value="CONTROLE FT4">CONTRÔLE FT4</option>
    <option value="CONTROLE FT6">CONTRÔLE FT6</option>
  </select>
  
  <div id="alerteZoneSecurisee" class="zone-securisee-alerte">
    (SEULEMENT POUR LES ZONES SÉCURISÉES)
  </div>

  <hr>

  <h2>Ajouter des câbles</h2>
  <div class="ligne-ajout">
    <input type="number" id="quantite" min="1" placeholder="Qté">
    <select id="typeCable" class="champ-placeholder">
      <option value="">Câble</option>
    </select>
    <button id="btnAjouter" disabled>+</button>
  </div>

  <hr>

  <h2>Câbles ajoutés</h2>
  <ul id="listeCables"></ul>
  <button id="viderListe">Vider la liste</button>

  <hr>

  <h2>Résultats</h2>
  <div id="resultat">Ajoute des câbles pour voir les résultats.</div>
  <button id="btnPdf">Exporter en PDF</button>

  <!-- Zone lue par votre fichier CSS pour l'impression -->
  <div id="pdfHeader" style="display:none;">
    <h1 style="font-size: 28px; line-height: 1.3; margin-bottom: 15px;">Rapport<br>Remplissage de conduit</h1>
    <hr>
    <!-- Le contenu dynamique est replacé ici pour hériter des règles d'impression -->
    <div id="pdfContent"></div>
  </div>

  <script src="app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js")
          .then(reg => console.log("Service Worker enregistré avec succès !", reg.scope))
          .catch(err => console.error("Échec de l'enregistrement du Service Worker :", err));
      });
    }
  </script>

</body>
</html>
